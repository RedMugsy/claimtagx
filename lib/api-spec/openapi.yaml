openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: assets
    description: Custody assets
  - name: shifts
    description: Handler work shifts
  - name: services
    description: Patron service requests tied to a ticket
  - name: messages
    description: Per-venue team chat
  - name: intercom
    description: Push-to-talk channels per venue
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /venues/{venueCode}/assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List custody assets for a venue
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
        - in: query
          name: status
          required: false
          description: Filter by asset status. Omit to return all statuses.
          schema:
            $ref: "#/components/schemas/AssetStatus"
        - in: query
          name: mode
          required: false
          description: Filter by asset mode.
          schema:
            $ref: "#/components/schemas/AssetMode"
        - in: query
          name: handler
          required: false
          description: Filter by handler name (matches intake or release handler, case-insensitive substring).
          schema: { type: string }
        - in: query
          name: from
          required: false
          description: Lower bound (epoch ms). Filters on releasedAt when status=released, otherwise intakeAt.
          schema: { type: integer }
        - in: query
          name: to
          required: false
          description: Upper bound (epoch ms). Filters on releasedAt when status=released, otherwise intakeAt.
          schema: { type: integer }
      responses:
        "200":
          description: Asset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustodyAsset"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Intake a new asset and issue a ticket
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustodyAsset"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /venues/{venueCode}/assets/{ticketId}:
    get:
      operationId: getAssetByTicket
      tags: [assets]
      summary: Look up an asset by ticket id (case-insensitive)
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustodyAsset"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /venues/{venueCode}/tamper-events:
    get:
      operationId: listTamperEvents
      tags: [assets]
      summary: List recent failed signature verification attempts for a venue
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
        - in: query
          name: limit
          required: false
          description: Maximum number of events to return (default 50, max 200).
          schema: { type: integer }
        - in: query
          name: from
          required: false
          description: Lower bound (epoch ms) on attempt time.
          schema: { type: integer }
        - in: query
          name: to
          required: false
          description: Upper bound (epoch ms) on attempt time.
          schema: { type: integer }
        - in: query
          name: ticketId
          required: false
          description: Filter by ticket id (case-insensitive substring match).
          schema: { type: string }
        - in: query
          name: source
          required: false
          description: Filter by where the request originated.
          schema:
            type: string
            enum: [scan, manual]
        - in: query
          name: acknowledged
          required: false
          description: When false, only unreviewed attempts are returned. When true, only reviewed attempts. Omit to return both.
          schema: { type: boolean }
      responses:
        "200":
          description: Tamper attempt list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TamperEvent"
  /venues/{venueCode}/tamper-events/{eventId}/acknowledge:
    post:
      operationId: acknowledgeTamperEvent
      tags: [assets]
      summary: Mark a tamper attempt as reviewed so it drops out of the unread badge
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
        - in: path
          name: eventId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated tamper event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TamperEvent"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /venues/{venueCode}/assets/{ticketId}/release:
    post:
      operationId: releaseAsset
      tags: [assets]
      summary: Release a held asset
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseAssetRequest"
      responses:
        "200":
          description: Released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustodyAsset"
        "404":
          description: Not found or not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /me/shift/active:
    get:
      operationId: getActiveShift
      tags: [shifts]
      summary: Get the signed-in handler's currently active shift, if any
      responses:
        "200":
          description: Active shift or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveShiftResponse"
  /me/shifts/start:
    post:
      operationId: startShift
      tags: [shifts]
      summary: Start a new shift for the signed-in handler
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartShiftRequest"
      responses:
        "201":
          description: Shift started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
        "409":
          description: Already on shift at this venue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /me/shifts/{shiftId}/end:
    post:
      operationId: endShift
      tags: [shifts]
      summary: End an active shift owned by the signed-in handler
      parameters:
        - in: path
          name: shiftId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Ended shift
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /venues/{venueCode}/shifts/active:
    get:
      operationId: listActiveVenueShifts
      tags: [shifts]
      summary: List currently active shifts at a venue (visible to all members)
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Active shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shift"
  /venues/{venueCode}/services:
    get:
      operationId: listServiceRequests
      tags: [services]
      summary: List service requests for a venue
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
        - in: query
          name: status
          required: false
          schema:
            $ref: "#/components/schemas/ServiceRequestStatus"
      responses:
        "200":
          description: Service requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceRequest"
    post:
      operationId: createServiceRequest
      tags: [services]
      summary: Create a service request tied to a ticket
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceRequest"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
        "404":
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /venues/{venueCode}/services/open-count:
    get:
      operationId: getOpenServiceCount
      tags: [services]
      summary: Count of open + claimed service requests
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountResponse"
  /venues/{venueCode}/services/{id}/claim:
    post:
      operationId: claimServiceRequest
      tags: [services]
      summary: Claim an open service request for the current handler
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceRequest"
        "409":
          description: Already claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorMessage"
  /venues/{venueCode}/services/{id}/complete:
    post:
      operationId: completeServiceRequest
      tags: [services]
      summary: Mark a service request as completed
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceRequest"
  /venues/{venueCode}/services/{id}/cancel:
    post:
      operationId: cancelServiceRequest
      tags: [services]
      summary: Cancel a service request
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceRequest"
  /venues/{venueCode}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List recent venue chat messages (oldest-first)
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: postMessage
      tags: [messages]
      summary: Post a message to the venue chat
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostMessageRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
  /venues/{venueCode}/messages/read:
    post:
      operationId: markMessagesRead
      tags: [messages]
      summary: Mark all messages up to now as read
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkReadResponse"
  /venues/{venueCode}/messages/unread-count:
    get:
      operationId: getUnreadMessageCount
      tags: [messages]
      summary: Count of messages newer than this handler's last read
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountResponse"
  /venues/{venueCode}/intercom/join:
    post:
      operationId: joinIntercom
      tags: [intercom]
      summary: Join (or heartbeat) the venue intercom channel
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinIntercomResponse"
  /venues/{venueCode}/intercom/leave:
    post:
      operationId: leaveIntercom
      tags: [intercom]
      summary: Leave the venue intercom channel
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Left
  /venues/{venueCode}/intercom/presence:
    get:
      operationId: listIntercomPresence
      tags: [intercom]
      summary: List handlers currently on the intercom channel
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Presence
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntercomPresence"
  /venues/{venueCode}/intercom/transmit:
    post:
      operationId: transmitIntercom
      tags: [intercom]
      summary: Push-to-talk transmission (base64-encoded audio clip)
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransmitIntercomRequest"
      responses:
        "201":
          description: Transmitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntercomTransmission"
  /venues/{venueCode}/intercom/transmissions:
    get:
      operationId: listIntercomTransmissions
      tags: [intercom]
      summary: Recent push-to-talk transmissions on the venue channel
      parameters:
        - in: path
          name: venueCode
          required: true
          schema: { type: string }
        - in: query
          name: since
          required: false
          description: Epoch ms; only return transmissions newer than this.
          schema: { type: integer }
      responses:
        "200":
          description: Transmissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntercomTransmission"
components:
  schemas:
    Shift:
      type: object
      properties:
        id:
          type: string
        venueCode:
          type: string
        handlerUserId:
          type: string
        handlerEmail:
          type: string
        handlerName:
          type: string
        role:
          type: string
        targetMinutes:
          type: integer
          description: Planned shift length in minutes; used to compute remaining time.
        startedAt:
          type: integer
          description: Epoch milliseconds when the shift started.
        endedAt:
          type: ["integer", "null"]
          description: Epoch milliseconds when the shift ended, or null if still active.
        endReason:
          type: ["string", "null"]
          description: How the shift ended. Null while active; "manual" when the handler tapped End; "auto-timeout" when the safety net auto-closed a forgotten shift.
      required:
        - id
        - venueCode
        - handlerUserId
        - handlerEmail
        - handlerName
        - role
        - targetMinutes
        - startedAt
    ActiveShiftResponse:
      type: object
      properties:
        shift:
          oneOf:
            - $ref: "#/components/schemas/Shift"
            - type: "null"
      required:
        - shift
    StartShiftRequest:
      type: object
      properties:
        venueCode:
          type: string
        targetMinutes:
          type: integer
          minimum: 30
          maximum: 1440
      required:
        - venueCode
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiErrorMessage:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AssetMode:
      type: string
      enum: [vehicles, baggage, cloakrooms, bags]
    AssetStatus:
      type: string
      enum: [active, released]
    Patron:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
      required:
        - name
        - phone
    AssetFieldValue:
      oneOf:
        - type: string
        - type: number
        - type: boolean
    CustodyAsset:
      type: object
      properties:
        id:
          type: string
        ticketId:
          type: string
        venueCode:
          type: string
        mode:
          $ref: "#/components/schemas/AssetMode"
        patron:
          $ref: "#/components/schemas/Patron"
        fields:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/AssetFieldValue"
        photos:
          type: array
          items: { type: string }
        intakeAt:
          type: integer
          description: Epoch milliseconds
        handler:
          type: string
        status:
          $ref: "#/components/schemas/AssetStatus"
        releasedAt:
          type: ["integer", "null"]
          description: Epoch milliseconds, present when released
        releasedBy:
          type: ["string", "null"]
          description: Name of the handler who released the asset, when known.
        signature:
          type: string
          description: HMAC signature of the ticket id, used by handler-issued QR codes
      required:
        - id
        - ticketId
        - venueCode
        - mode
        - patron
        - fields
        - photos
        - intakeAt
        - handler
        - status
        - signature
    TamperEvent:
      type: object
      description: A failed signature verification attempt logged when someone tries to release a tag with an invalid or missing signature.
      properties:
        id:
          type: string
        venueCode:
          type: string
        ticketId:
          type: ["string", "null"]
          description: Ticket id presented by the scanner, when known.
        assetId:
          type: ["string", "null"]
          description: Matching asset id, when the ticket id corresponds to a real asset.
        source:
          type: ["string", "null"]
          enum: [scan, manual, null]
          description: Where the request originated.
        reason:
          type: string
          description: Short description of why the verification failed.
        at:
          type: integer
          description: Epoch milliseconds when the attempt was logged.
        acknowledgedAt:
          type: ["integer", "null"]
          description: Epoch milliseconds when an owner marked the attempt as reviewed, or null if still unread.
      required:
        - id
        - venueCode
        - reason
        - at
    CreateAssetRequest:
      type: object
      properties:
        mode:
          $ref: "#/components/schemas/AssetMode"
        patron:
          $ref: "#/components/schemas/Patron"
        fields:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/AssetFieldValue"
        photos:
          type: array
          items: { type: string }
        handlerEmail:
          type: string
        handlerName:
          type: string
        venueName:
          type: string
      required:
        - mode
        - patron
        - fields
        - photos
        - handlerEmail
        - handlerName
    CountResponse:
      type: object
      properties:
        count:
          type: integer
      required:
        - count
    ServiceRequestStatus:
      type: string
      enum: [open, claimed, done, cancelled]
    ServiceRequestKind:
      type: string
      enum:
        - bring_my_car
        - fetch_my_coat
        - repack_my_bag
        - deliver_to_table
        - other
    ServiceRequest:
      type: object
      properties:
        id: { type: string }
        venueCode: { type: string }
        ticketId: { type: string }
        assetId:
          type: ["string", "null"]
        kind:
          $ref: "#/components/schemas/ServiceRequestKind"
        notes: { type: string }
        status:
          $ref: "#/components/schemas/ServiceRequestStatus"
        requestedByName: { type: string }
        claimedByUserId:
          type: ["string", "null"]
        claimedByName:
          type: ["string", "null"]
        createdAt: { type: integer }
        claimedAt:
          type: ["integer", "null"]
        completedAt:
          type: ["integer", "null"]
      required:
        - id
        - venueCode
        - ticketId
        - kind
        - notes
        - status
        - requestedByName
        - createdAt
    CreateServiceRequest:
      type: object
      properties:
        ticketId: { type: string }
        kind:
          $ref: "#/components/schemas/ServiceRequestKind"
        notes: { type: string }
        requestedByName: { type: string }
      required:
        - ticketId
        - kind
    ChatMessage:
      type: object
      properties:
        id: { type: string }
        venueCode: { type: string }
        authorUserId: { type: string }
        authorName: { type: string }
        body: { type: string }
        createdAt: { type: integer }
      required:
        - id
        - venueCode
        - authorUserId
        - authorName
        - body
        - createdAt
    PostMessageRequest:
      type: object
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 2000
      required:
        - body
    MarkReadResponse:
      type: object
      properties:
        lastReadAt: { type: integer }
      required:
        - lastReadAt
    JoinIntercomResponse:
      type: object
      properties:
        joinedAt: { type: integer }
      required:
        - joinedAt
    IntercomPresence:
      type: object
      properties:
        handlerUserId: { type: string }
        handlerName: { type: string }
        joinedAt: { type: integer }
      required:
        - handlerUserId
        - handlerName
        - joinedAt
    IntercomTransmission:
      type: object
      properties:
        id: { type: string }
        venueCode: { type: string }
        senderUserId: { type: string }
        senderName: { type: string }
        audioBase64: { type: string }
        mimeType: { type: string }
        durationMs: { type: integer }
        createdAt: { type: integer }
      required:
        - id
        - venueCode
        - senderUserId
        - senderName
        - audioBase64
        - mimeType
        - durationMs
        - createdAt
    TransmitIntercomRequest:
      type: object
      properties:
        audioBase64: { type: string }
        mimeType: { type: string }
        durationMs: { type: integer }
      required:
        - audioBase64
    ReleaseAssetRequest:
      type: object
      properties:
        handlerEmail:
          type: string
        handlerName:
          type: string
        signature:
          type: string
          description: HMAC signature from a scanned QR; verified server-side. Omit for manual entry fallback.
        source:
          type: string
          enum: [scan, manual]
          description: Where the ticket id originated. "scan" requires a valid signature; "manual" is the fallback when a handler types the id.
